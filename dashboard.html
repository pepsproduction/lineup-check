<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>แดชบอร์ด — LineUp Check</title>
  <meta name="description" content="แดชบอร์ดสรุปการเช็คชื่อ">
  <meta name="theme-color" content="#2563EB">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <style>
    .dashboard-hero {
      background: linear-gradient(135deg, #1D4ED8, #2563EB 60%, #7C3AED);
      color: white;
      padding: 20px 20px 32px;
      margin: -16px -16px 20px;
      border-radius: 0 0 24px 24px;
    }
    .dashboard-greeting {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 4px;
    }
    .dashboard-school {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .dashboard-date {
      font-size: 13px;
      opacity: 0.75;
    }
    .summary-section {
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }
    .summary-title {
      font-size: 14px;
      font-weight: 600;
      opacity: 0.85;
      margin-bottom: 12px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .summary-item {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 6px;
      text-align: center;
    }
    .summary-item .s-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }
    .summary-item .s-label {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 3px;
    }
    .progress-section {
      margin-top: 12px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 6px;
    }
    .hero-progress { background: rgba(255,255,255,0.25); }
    .hero-progress .progress-fill { background: white; }
    .class-selector {
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .class-selector label {
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      color: var(--text-secondary);
    }
    .class-selector select {
      flex: 1;
      border: none;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      background: transparent;
      outline: none;
      font-family: var(--font-family);
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span style="font-size:20px">📋</span>
    </div>
    <div class="header-title" id="school-name-header">LineUp Check</div>
    <div class="header-right">
      <button class="header-btn" data-action="logout" title="ออกจากระบบ">🚪</button>
    </div>
  </header>

  <div id="connection-banner" class="connection-banner"></div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Hero Section -->
    <div class="dashboard-hero">
      <div class="dashboard-greeting">สวัสดี, <span id="user-name">ผู้ใช้</span></div>
      <div class="dashboard-school" id="school-display">โรงเรียน</div>
      <div class="dashboard-date" id="today-display"></div>

      <!-- Class Selector -->
      <div class="summary-section">
        <div class="summary-title">📊 สรุปวันนี้</div>

        <!-- Summary grid -->
        <div class="summary-grid" id="summary-grid">
          <div class="summary-item">
            <div class="s-value" id="s-present">—</div>
            <div class="s-label">✅ มา</div>
          </div>
          <div class="summary-item">
            <div class="s-value" id="s-late">—</div>
            <div class="s-label">⏰ สาย</div>
          </div>
          <div class="summary-item">
            <div class="s-value" id="s-leave">—</div>
            <div class="s-label">🔵 ลา</div>
          </div>
          <div class="summary-item">
            <div class="s-value" id="s-absent">—</div>
            <div class="s-label">❌ ขาด</div>
          </div>
          <div class="summary-item">
            <div class="s-value" id="s-pending">—</div>
            <div class="s-label">⭕ ยังไม่เช็ค</div>
          </div>
          <div class="summary-item">
            <div class="s-value" id="s-total">—</div>
            <div class="s-label">👥 ทั้งหมด</div>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-label">
            <span>ความคืบหน้า</span>
            <span id="progress-pct">0%</span>
          </div>
          <div class="progress-bar hero-progress">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Class Selector -->
    <div class="class-selector">
      <label for="class-select">ห้อง:</label>
      <select id="class-select" onchange="loadSummary()">
        <option value="">ทั้งหมด</option>
      </select>
      <button onclick="loadSummary()" style="background:none;border:none;font-size:18px;cursor:pointer" title="รีเฟรช">🔄</button>
    </div>

    <!-- Quick Actions -->
    <div class="section-header">
      <h2 class="section-title">เมนูหลัก</h2>
    </div>

    <div class="quick-actions">
      <a href="scan.html" class="quick-action-btn" id="btn-scan">
        <span class="action-icon">📷</span>
        <span>สแกน QR</span>
      </a>
      <a href="classes.html" class="quick-action-btn">
        <span class="action-icon">🏫</span>
        <span>ห้องเรียน</span>
      </a>
      <a href="students.html" class="quick-action-btn" id="btn-students">
        <span class="action-icon">👥</span>
        <span>นักเรียน</span>
      </a>
      <a href="reports.html" class="quick-action-btn">
        <span class="action-icon">📊</span>
        <span>รายงาน</span>
      </a>
      <a href="qr-print.html" class="quick-action-btn">
        <span class="action-icon">🖨️</span>
        <span>พิมพ์ QR</span>
      </a>
      <a href="settings.html" class="quick-action-btn" id="btn-settings">
        <span class="action-icon">⚙️</span>
        <span>ตั้งค่า</span>
      </a>
    </div>

    <!-- Offline Queue Notice -->
    <div id="offline-notice" class="hidden">
      <div class="alert alert-warning">
        <span class="alert-icon">📤</span>
        <div class="alert-content">
          <div class="alert-title">มีข้อมูลรอ Sync</div>
          <div class="alert-text">
            <span id="offline-count">0</span> รายการรอส่ง
            <a href="offline.html" style="color:var(--status-late);font-weight:700"> ดูรายการ →</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span>หน้าแรก</span>
    </a>
    <a href="scan.html" class="nav-scan" aria-label="สแกน QR">📷</a>
    <a href="classes.html" class="nav-item">
      <span class="nav-icon">🏫</span>
      <span>ห้อง</span>
    </a>
    <a href="reports.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span>รายงาน</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span>ตั้งค่า</span>
    </a>
  </nav>
</div>

<div id="toast-container"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script>
<script>
let _dashUser = null;

document.addEventListener('DOMContentLoaded', async () => {
  _dashUser = await Auth.requireLogin();
  if (!_dashUser) return;

  renderPageHeader(_dashUser);

  // Show user name
  $id('user-name').textContent = _dashUser.full_name || _dashUser.username;

  // Today's date
  $id('today-display').textContent = formatDateThai();

  // School name
  const schoolName = lsGet(APP_CONFIG.STORAGE_KEYS.SCHOOL_NAME, 'โรงเรียน');
  $id('school-display').textContent = schoolName;

  // Hide settings for non-admin
  if (!Auth.canManageSystem(_dashUser)) {
    // Still show settings but limited
  }

  // Load classes
  await loadDashClasses();

  // Check offline queue
  checkOfflineQueue();
});

async function loadDashClasses() {
  const res = await API.listClasses();
  if (!res.ok) return;

  const classes = res.data || [];
  const sel = $id('class-select');
  sel.innerHTML = '<option value="">ทุกห้อง</option>' +
    classes.map(c => `<option value="${escapeHtml(c.class_id)}">${escapeHtml(c.class_name)}</option>`).join('');

  // Restore last selected class
  const lastClass = lsGet(APP_CONFIG.STORAGE_KEYS.LAST_CLASS, '');
  if (lastClass) sel.value = lastClass;

  loadSummary();
}

async function loadSummary() {
  const classId = $id('class-select').value;
  lsSet(APP_CONFIG.STORAGE_KEYS.LAST_CLASS, classId);

  const res = await API.getTodaySummary(classId);
  if (!res.ok) return;

  const s = res.data || {};
  const summary = s.summary || s;

  $id('s-present').textContent = summary.present ?? 0;
  $id('s-late').textContent    = summary.late    ?? 0;
  $id('s-leave').textContent   = summary.leave   ?? 0;
  $id('s-absent').textContent  = summary.absent  ?? 0;
  $id('s-pending').textContent = summary.pending ?? 0;
  $id('s-total').textContent   = summary.total   ?? 0;

  const total   = parseInt(summary.total) || 0;
  const checked = (parseInt(summary.present)||0) + (parseInt(summary.late)||0) + (parseInt(summary.leave)||0) + (parseInt(summary.absent)||0);
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  $id('progress-fill').style.width = pct + '%';
  $id('progress-pct').textContent  = pct + '%';
}

function checkOfflineQueue() {
  const queue = lsGet(APP_CONFIG.OFFLINE_QUEUE_KEY, []);
  if (queue.length > 0) {
    $id('offline-count').textContent = queue.length;
    showEl('offline-notice');
  }
}
</script>
</body>
</html>
