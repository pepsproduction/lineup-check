<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>รายงาน — LineUp Check</title>
  <meta name="description" content="รายงานการเช็คชื่อนักเรียน">
  <meta name="theme-color" content="#2563EB">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/mobile.css">
</head>
<body>
<div class="page-wrapper">
  <header class="app-header">
    <div class="header-left">
      <a href="dashboard.html" class="header-btn">←</a>
    </div>
    <div class="header-title">รายงาน</div>
    <div class="header-right"></div>
  </header>

  <div id="connection-banner" class="connection-banner"></div>

  <main class="main-content">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="daily">รายวัน</button>
      <button class="tab-btn" data-tab="monthly">รายเดือน</button>
      <button class="tab-btn" data-tab="pending">ยังไม่มา</button>
    </div>

    <!-- Filter Controls -->
    <div class="card card-sm mb-md">
      <div class="form-group">
        <label class="form-label" for="report-class">ห้องเรียน</label>
        <select id="report-class" class="form-control">
          <option value="">-- เลือกห้องเรียน --</option>
        </select>
      </div>

      <!-- Daily tab extras -->
      <div id="tab-daily-filters">
        <div class="form-group">
          <label class="form-label" for="report-date">วันที่</label>
          <input type="date" id="report-date" class="form-control">
        </div>
      </div>

      <!-- Monthly tab extras -->
      <div id="tab-monthly-filters" style="display:none">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label" for="report-year">ปี (พ.ศ.)</label>
            <input type="number" id="report-year" class="form-control" min="2560" max="2580" placeholder="2568">
          </div>
          <div class="form-group">
            <label class="form-label" for="report-month">เดือน</label>
            <select id="report-month" class="form-control">
              <option value="01">มกราคม</option>
              <option value="02">กุมภาพันธ์</option>
              <option value="03">มีนาคม</option>
              <option value="04">เมษายน</option>
              <option value="05">พฤษภาคม</option>
              <option value="06">มิถุนายน</option>
              <option value="07">กรกฎาคม</option>
              <option value="08">สิงหาคม</option>
              <option value="09">กันยายน</option>
              <option value="10">ตุลาคม</option>
              <option value="11">พฤศจิกายน</option>
              <option value="12">ธันวาคม</option>
            </select>
          </div>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="btn-load-report">🔍 ดูรายงาน</button>
    </div>

    <!-- Report Result Area -->
    <div id="report-result"></div>
  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-icon">🏠</span><span>หน้าแรก</span>
    </a>
    <a href="scan.html" class="nav-scan">📷</a>
    <a href="classes.html" class="nav-item">
      <span class="nav-icon">🏫</span><span>ห้อง</span>
    </a>
    <a href="reports.html" class="nav-item active">
      <span class="nav-icon">📊</span><span>รายงาน</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="nav-icon">⚙️</span><span>ตั้งค่า</span>
    </a>
  </nav>
</div>

<div id="toast-container"></div>

<!-- SheetJS for Excel export -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/excel-export.js"></script>
<script src="assets/js/reports.js"></script>
<script>
// Handle tab switching to show/hide date filters
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      $id('tab-daily-filters').style.display   = (tab === 'daily' || tab === 'pending') ? '' : 'none';
      $id('tab-monthly-filters').style.display = tab === 'monthly' ? '' : 'none';
    });
  });

  // Check URL params for pre-selected class/tab
  const params = new URLSearchParams(location.search);
  const tabParam   = params.get('tab');
  const classParam = params.get('class');

  if (tabParam) {
    setTimeout(() => {
      const tabBtn = document.querySelector(`[data-tab="${tabParam}"]`);
      if (tabBtn) tabBtn.click();
    }, 500);
  }
  if (classParam) {
    setTimeout(() => {
      const sel = $id('report-class');
      if (sel) sel.value = classParam;
    }, 600);
  }
});
</script>
</body>
</html>
