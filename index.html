<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LineUp Check — ระบบเช็คชื่อเข้าแถว</title>
  <meta name="description" content="ระบบเช็คชื่อนักเรียนเข้าแถวด้วย QR Code สำหรับโรงเรียน">
  <meta name="theme-color" content="#2563EB">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/mobile.css">
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1D4ED8 0%, #2563EB 40%, #7C3AED 100%);
      padding: 32px 24px;
      text-align: center;
    }
    .hero-logo {
      width: 96px;
      height: 96px;
      background: rgba(255,255,255,0.15);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      margin: 0 auto 24px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .hero-title {
      font-size: 36px;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .hero-subtitle {
      font-size: 18px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 48px;
      max-width: 320px;
    }
    .hero-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
      text-align: left;
      width: 100%;
      max-width: 320px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.12);
      padding: 12px 16px;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      backdrop-filter: blur(4px);
    }
    .feature-icon { font-size: 24px; flex-shrink: 0; }
    .hero-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }
    .btn-hero-primary {
      background: white;
      color: var(--brand-primary);
      font-size: 18px;
      font-weight: 700;
      height: 56px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .btn-hero-secondary {
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 16px;
      font-weight: 600;
      height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
    }
    .version-badge {
      margin-top: 32px;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
    }
  </style>
</head>
<body>
<div class="hero">
  <div class="hero-logo">📋</div>
  <h1 class="hero-title">LineUp Check</h1>
  <p class="hero-subtitle">ระบบเช็คชื่อนักเรียนเข้าแถวด้วย QR Code</p>

  <div class="hero-features">
    <div class="feature-item">
      <span class="feature-icon">📱</span>
      <span>สแกน QR ผ่านมือถือ ไม่ต้องลงแอป</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">📊</span>
      <span>บันทึกลง Google Sheet อัตโนมัติ</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">📥</span>
      <span>Export Excel รายงานได้ทันที</span>
    </div>
    <div class="feature-item">
      <span class="feature-icon">🔒</span>
      <span>ระบบ Login หลายสิทธิ์ ปลอดภัย</span>
    </div>
  </div>

  <div class="hero-actions">
    <a href="login.html" class="btn btn-hero-primary">🚀 เข้าสู่ระบบ</a>
    <a href="setup.html" class="btn btn-hero-secondary">⚙️ ตั้งค่าครั้งแรก</a>
  </div>

  <div class="version-badge">LineUp Check v1.0.0</div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script>
  // Auto-redirect if already logged in
  document.addEventListener('DOMContentLoaded', () => {
    const token = lsGet(APP_CONFIG.STORAGE_KEYS.SESSION_TOKEN);
    const apiUrl = lsGet(APP_CONFIG.STORAGE_KEYS.API_URL);
    if (token && apiUrl) {
      window.location.href = 'dashboard.html';
    }
  });
</script>
</body>
</html>
